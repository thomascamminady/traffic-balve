<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"> <!-- Ensure correct character encoding -->
    <title>Verkehrsmonitor Balve</title>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto"
    />
    <style>
      body {
          text-align: center;
          margin: 0;
          padding: 0;
          font-family: 'Roboto', sans-serif;
      }
      svg {
          margin: 20px auto;
          display: block;
      }
      .axis path,
      .axis line {
          fill: none;
          stroke: lightgray;
          stroke-opacity: 0.7;
          shape-rendering: crispEdges;
      }
      .line {
          fill: none;
          stroke-width: 1.5px;
      }
      .grid line {
          stroke: lightgray;
          stroke-opacity: 0.5;
          shape-rendering: crispEdges;
      }
      .grid path {
          stroke-width: 0;
      }
      .footer {
          text-align: left;
          margin: 20px;
          font-size: 14px;
      }
      .footer a {
          color: #0000ff; /* Blue color for links */
          text-decoration: none;
      }
      .footer img {
          vertical-align: middle;
          height: 20px;
      }
  </style>
  </head>
  <body>
    <h1>Verkehrsmonitor Balve</h1>
    <script>
      // URL of the CSV data
      const dataUrl =
        "https://raw.githubusercontent.com/thomascamminady/traffic-balve/main/data/summary.csv";

      // Fetch the CSV data
      fetch(dataUrl)
        .then((response) => response.text())
        .then((data) => {
          const parsedData = d3.csvParse(data, d3.autoType);

          // Sort the fromValues in the specific order
          const fromValues = Array.from(
            new Set(parsedData.map((d) => d.from))
          ).sort((a, b) => {
            const order = ["Höhle", "Krankenhaus", "Krumpaul"];
            return order.indexOf(a) - order.indexOf(b);
          });

          fromValues.forEach((fromValue) => {
            createChart(
              parsedData.filter((d) => d.from === fromValue),
              fromValue
            );
          });
        })
        .catch((error) => console.error("Error fetching the data:", error));

      function createChart(data, fromValue) {
        // Dimensions and margins of the graph
        const margin = { top: 10, right: 30, bottom: 30, left: 60 },
          width = 960 - margin.left - margin.right,
          height = 400 - margin.top - margin.bottom;

        // Append the svg object to the body of the page
        const svg = d3
          .select("body")
          .append("svg")
          .attr("width", width + margin.left + margin.right)
          .attr("height", height + margin.top + margin.bottom)
          .append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        // Parse the date / time
        const parseTime = d3.timeParse("%H:%M:%S");

        // Format the data
        data.forEach((d) => {
          d.parsedTime = parseTime(d.datetime.split("T")[1].split(".")[0]);
          d.parsedDate = d3.timeFormat("%Y-%m-%d")(new Date(d.datetime));
        });

        const today = d3.timeFormat("%Y-%m-%d")(new Date());

        // Add X axis --> only time
        const x = d3
          .scaleTime()
          .domain(d3.extent(data, (d) => d.parsedTime))
          .range([0, width]);

        const xAxis = d3
          .axisBottom(x)
          .ticks(d3.timeHour.every(1))
          .tickFormat(d3.timeFormat("%H"));

        svg
          .append("g")
          .attr("transform", `translate(0, ${height})`)
          .call(xAxis);

        // Add Y axis
        const y = d3
          .scaleLinear()
          .domain([0, d3.max(data, (d) => +d.duration_in_traffic_s)])
          .range([height, 0]);
        svg.append("g").call(d3.axisLeft(y));

        // Add grid lines
        svg
          .append("g")
          .attr("class", "grid")
          .call(d3.axisLeft(y).tickSize(-width).tickFormat(""));
        svg
          .append("g")
          .attr("class", "grid")
          .attr("transform", `translate(0,${height})`)
          .call(xAxis.tickSize(-height).tickFormat(""));

        // Color scale for different routes
        const color = d3.scaleOrdinal(d3.schemeCategory10);

        // Group the data
        const sumstat = d3.group(data, (d) => d.from_to + "|" + d.parsedDate);

        // Draw the lines
        let todayLineEndPoints = {}; // Object to store the end points of today's lines
        svg
          .selectAll(".line")
          .data(sumstat)
          .join("path")
          .attr("class", "line")
          .attr("fill", "none")
          .attr("stroke", function (d) {
            const route = d[0].split("|")[0];
            todayLineEndPoints[route] = { x: null, y: null };
            return color(route);
          })
          .attr("stroke-width", 1.5)
          .attr("stroke-opacity", (d) =>
            d[0].split("|")[1] === today ? 1 : 0.11
          )
          .attr("d", function (d) {
            const line = d3
              .line()
              .x((d) => x(d.parsedTime))
              .y((d) => y(+d.duration_in_traffic_s));
            if (d[0].split("|")[1] === today) {
              const lastDataPoint = d[1][0];
              todayLineEndPoints[d[0].split("|")[0]] = {
                x: x(lastDataPoint.parsedTime),
                y: y(lastDataPoint.duration_in_traffic_s),
              };
            }
            return line(d[1]);
          });

        // Add title
        svg
          .append("text")
          .attr("x", 10)
          .attr("y", 330)
          .attr("text-anchor", "right")
          .style("font-size", "20px")
          //    .style("text-decoration", "underline")
          .text("Start: " + fromValue);
        // Add axis labels
        svg
          .append("text")
          .attr("transform", "rotate(-90)")
          .attr("y", 0 - margin.left)
          .attr("x", 0 - height / 2)
          .attr("dy", "1em")
          .style("text-anchor", "middle")
          .style("font-size", "15px")

          .text("Reisezeit [Sekunden]");

        svg
          .append("text")
          .attr(
            "transform",
            `translate(${width - 12}, ${height + margin.bottom})`
          )
          .style("text-anchor", "middle")
          .style("font-size", "15px")

          .text("Uhrzeit");

        const labelSpacing = 25; // Minimum spacing between labels
        let lastY = -Infinity;
        for (const [route, endPoint] of Object.entries(todayLineEndPoints)) {
          if (endPoint.x !== null && endPoint.y !== null) {
            // Add white background for the label
            // Adjust for overlapping labels
            if (endPoint.y - lastY < labelSpacing) {
              endPoint.y = lastY + labelSpacing;
            }
            lastY = endPoint.y;

            // Add label text
            svg
              .append("text")
              .attr("x", endPoint.x + 15)
              .attr("y", endPoint.y)
              .style("font-size", "20px")
              .style("fill", color(route))
              .text("Ziel: " + route.split(" -> ")[1]);
          }
        }
      }
    </script>
    <div class="footer">
      <p>Erstellt von Thomas Camminady (<a href="https://www.camminady.dev">Website</a>, <a href="https://github.com/thomascamminady">Github</a>) unter Verwendung von Python, Polars für Analyse und D3.js für Visualisierung. Webseite erstellt mit ChatGPT.</p>
      <p>Verkehrsdaten via Google Distance Matrix API. Zuletzt aktualisiert: <span id="update-time"></span></p>
  </div>
  <script>
      // JavaScript code to find the newest timestamp in the data

      fetch(dataUrl)
          .then((response) => response.text())
          .then((data) => {
              const parsedData = d3.csvParse(data, d3.autoType);
              const newestTimestamp = d3.max(parsedData, (d) => new Date(d.datetime).getTime());

              document.getElementById('update-time').textContent = "Zuletzt aktualisiert: " + formatTimestamp(newestTimestamp);
          })
          .catch((error) => console.error("Error fetching the data:", error));

      function formatTimestamp(timestamp) {
          const date = new Date(timestamp);
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          const hours = String(date.getHours()).padStart(2, '0');
          const minutes = String(date.getMinutes()).padStart(2, '0');
          const seconds = String(date.getSeconds()).padStart(2, '0');
          return `${day}.${month}.${year} ${hours}:${minutes}:${seconds}`;
      }
  </script>
  </body>
</html>
